# ========================
# NETWORK
# ========================
bind 0.0.0.0
port 6379

# ========================
# PERSISTÊNCIA
# ========================

# AOF (Append Only File) - recomendado para cache crítico
appendonly yes
appenddirname appendonlydir

# Snapshot (backup adicional)
save 900 1
save 300 10
save 60 10000

# Diretório de dados
dir /data

# ========================
# LOG
# ========================
logfile ""
loglevel notice

# ========================
# PERFORMANCE
# ========================
maxmemory 256mb
maxmemory-policy allkeys-lru

# ========================
# SEGURANÇA (mínimo viável)
# ========================

requirepass ${REDIS_PASSWORD}