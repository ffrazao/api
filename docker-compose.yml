networks:
  backend_net: # para isolar os serviços de backend
    driver: bridge
  frontend_net: # para isolar o frontend
    driver: bridge

volumes:
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  biometria_logs:
    driver: local

x-logging: &x-logging
  driver: "json-file"
  options:
    max-size: "1g"   # Limita cada arquivo de log a 1GB
    max-file: "3"

services:
  banco:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: banco_postgres
    image: banco_postgres_img:latest
    env_file:
      - .env
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/logs:/var/log/postgresql
      - ./postgres/conf:/etc/postgresql-custom
      - ./postgres/data:/var/lib/postgresql
      - ./.env:/docker-entrypoint-initdb.d/.env:ro
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    entrypoint: >
      sh -c "
      chown -R postgres:postgres /var/log/postgresql &&
      chmod -R 755 /var/log/postgresql &&
      exec docker-entrypoint.sh postgres
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_file_mode=0666"

  storage:
    build:
      context: ./seaweedfs
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: storage_seaweedfs
    image: storage_seaweedfs_img:latest
    env_file:
      - .env
      - .env.docker
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # Painel Master
      - "8888:8888" # Filer API
    volumes:
      - ./seaweedfs/data:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL", 
          "curl -k -f --connect-timeout 3 ${S3_FILER_API_ENDPOINT} || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 30s
    depends_on:
      banco:
        condition: service_healthy

  cache:
    build:
      context: ./redis
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: cache_redis
    image: cache_redis_img:latest
    env_file:
      - .env
      - .env.docker
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/logs:/var/log/redis
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    stop_grace_period: 30s
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}

  cacheview:
    build:
      context: ./redisinsight
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: redis_insight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - backend_net
    restart: unless-stopped

  biometria:
    build:
      context: ./facenet
      dockerfile: Dockerfile
      args:
        BIOMETRIA_USUARIO: ${BIOMETRIA_USUARIO:-appbiometria}
    logging: *x-logging
    container_name: biometria_facenet
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    image: biometria_facenet_img:latest
    env_file:
      - .env
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - biometria_logs:/home/${BIOMETRIA_USUARIO:-appbiometria}/app/logs
      - ./facenet/weights:/home/${BIOMETRIA_USUARIO:-appbiometria}/.deepface/weights
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf ${BIOMETRIA_URL:-http://localhost:8000}/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s
    depends_on:
      storage:
        condition: service_healthy

  iam:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: iam_keycloak
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    image: iam_keycloak_img:latest
    env_file:
      - .env
      - .env.docker
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/conf:/opt/keycloak/conf
      - ./keycloak/logs:/opt/keycloak/logs
      - ./keycloak/providers:/opt/keycloak/providers:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    stop_grace_period: 30s
    depends_on:
      banco:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: backend_spring_java
    profiles:
      - "completo"
    env_file:
      - .env
      - .env.docker
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    depends_on:
      banco:
        condition: service_healthy
      storage:
        condition: service_healthy
      iam:
        condition: service_healthy
      biometria:
        condition: service_healthy
      cache:
        condition: service_healthy
    stop_grace_period: 30s

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: frontend_web_reactjs
    image: frontend_web_img:latest
    profiles:
      - "completo"
    env_file:
      - .env
      - .env.docker
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-web:/app
      - /app/node_modules
    networks:
      - frontend_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  proxy:
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: proxy_nginx
    profiles:
      - "completo"
    env_file:
      - .env.docker
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/logs:/var/log/nginx
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - frontend_net
      - backend_net
    depends_on:
      frontend-web:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    logging: *x-logging
    container_name: sidecar_backup
    env_file:
      - .env
      - .env.docker
    volumes:
      - ../backups-app:/app/backups
      - ./seaweedfs/data:/data_storage:ro
    networks:
      - backend_net
    depends_on:
      banco:
        condition: service_healthy
      storage:
        condition: service_healthy